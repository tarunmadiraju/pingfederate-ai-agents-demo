apiVersion: v1
kind: Service
metadata:
  name: pingauthorize
  namespace: default
  labels:
    app: pingauthorize
spec:
  type: ClusterIP
  selector:
    app: pingauthorize
  ports:
  - name: https
    port: 8443
    targetPort: 8443
    protocol: TCP
  - name: admin
    port: 8444
    targetPort: 8444
    protocol: TCP
