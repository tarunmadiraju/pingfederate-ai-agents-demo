apiVersion: v1
kind: ConfigMap
metadata:
  name: pingidm-config
  namespace: default
data:
  # PingIDM OpenTelemetry Configuration
  otel-config.json: |
    {
      "openTelemetryConfig": {
        "enabled": true,
        "exporters": {
          "otlp": {
            "protocol": "grpc",
            "endpoint": "http://jaeger:4317",
            "headers": {}
          }
        },
        "tracers": {
          "sampler": {
            "type": "always_on"
          }
        }
      }
    }
  
  # PingIDM Bootstrap Configuration
  bootstrap.properties: |
    openidm.port.0=8080
    openidm.port.0.secure=false
    openidm.port.1=8443
    openidm.port.1.secure=true
    openidm.jmx.port=9010
    openidm.keystore.type=jceks
    openidm.keystore.location=security/keystore.jceks
    openidm.keystore.password=&{KEYSTORE_PASSWORD}
    openidm.truststore.type=jceks
    openidm.truststore.location=security/truststore.jceks
    openidm.truststore.password=&{TRUSTSTORE_PASSWORD}
