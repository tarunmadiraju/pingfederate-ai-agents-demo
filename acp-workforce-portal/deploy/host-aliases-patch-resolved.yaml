# host-aliases-patch.yaml — TEMPLATE (not applied directly)
# Resolves .localhost hostnames inside pods.
#
# Alpine uses musl libc which intercepts *.localhost → 127.0.0.1 (RFC 6761)
# before querying DNS. hostAliases injects /etc/hosts entries that are checked
# before that interception, routing traffic to Traefik's ClusterIP instead.
#
# This file is a TEMPLATE. render_host_aliases() (lib/deploy.sh) envsubst's it
# into host-aliases-patch-resolved.yaml at deploy time, and kustomization.yaml
# references THAT generated file under `patches:`. This bakes hostAliases into
# the initial `kubectl apply -k` so the workload is created correctly in one
# rollout — no second rollout from a post-apply `kubectl patch`.
#
# Two variables are substituted at deploy time:
#   10.43.92.55  Traefik ClusterIP (dynamic per cluster)
#   1782277788   per-deploy timestamp → pod-template annotation. Changing it
#                  on redeploy forces a re-pull of the :latest image, replacing
#                  the old standalone `kubectl rollout restart` step.
#
# Outbound calls made by this pod:
#   - acp-expense-mcp.localhost: MCP server reset endpoint (POST /reset in server.js)
#
# Note: The portal itself is reached by browsers via PingAccess
#       (portal-external.localhost → PA → portal-internal.localhost → this pod).
#       Those are inbound paths — this pod does not call them outbound.
#       AG-UI agent calls (/api/agent/*) are handled by PA directly, not proxied
#       through this pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acp-workforce-portal
  namespace: acp-workforce-portal
spec:
  template:
    metadata:
      annotations:
        acp.deploy/restarted-at: "1782277788"
    spec:
      hostAliases:
        - ip: "10.43.92.55"
          hostnames:
            - acp-expense-mcp.localhost
