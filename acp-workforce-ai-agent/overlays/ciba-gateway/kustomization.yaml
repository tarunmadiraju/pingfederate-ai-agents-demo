apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Gateway-managed CIBA overlay
#
# Switches CIBA step-up from the authn sidecar to PingGateway.
# The only change is the Envoy outbound config: pinggateway.localhost
# routes to original_dst (passthrough) instead of the CIBA proxy.
# Inbound ext_proc (subject/actor header rewriting) is unchanged.
#
# Usage:
#   kubectl apply -k acp-workforce-ai-agent/overlays/ciba-gateway/

resources:
- ../../deploy  # base deploy/

configMapGenerator:
# Override the acp-workforce-ai-agent-envoy-config ConfigMap with the gateway-mode variant
- files:
  - envoy.yaml
  name: acp-workforce-ai-agent-envoy-config
  behavior: replace

generatorOptions:
  disableNameSuffixHash: true
