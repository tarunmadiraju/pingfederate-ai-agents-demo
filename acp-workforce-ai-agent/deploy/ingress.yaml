apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: acp-workforce-ai-agent
  namespace: ai-agents
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: workforce-ai-agent.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: acp-workforce-ai-agent
                port:
                  number: 3001
---
# HTTPS IngressRoute for JWKS endpoint
# PingFederate's JWT Token Processor 2.0 requires HTTPS for JWKS URLs.
# Traefik terminates TLS with its default self-signed cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: acp-workforce-ai-agent-tls
  namespace: ai-agents
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`workforce-ai-agent.localhost`)
      services:
        - name: acp-workforce-ai-agent
          port: 3001
  tls: {}
